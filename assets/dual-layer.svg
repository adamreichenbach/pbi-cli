<svg xmlns="http://www.w3.org/2000/svg" width="850" height="420" viewBox="0 0 850 420">
  <defs>
    <linearGradient id="dl-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2C811" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F2C811" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F2C811" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dl-b1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#EBBB14"/>
      <stop offset="100%" stop-color="#B25400"/>
    </linearGradient>
    <linearGradient id="dl-b2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F9E583"/>
      <stop offset="100%" stop-color="#DE9800"/>
    </linearGradient>
    <linearGradient id="dl-b3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F9E68B"/>
      <stop offset="100%" stop-color="#F3CD32"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117" rx="8"/>

  <!-- Badge -->
  <rect x="285" y="12" width="280" height="28" rx="14" fill="#161b22" stroke="#F2C811" stroke-width="1.5"/>
  <text x="425" y="31" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#F2C811" text-anchor="middle" font-weight="bold">THE FIRST CLI FOR BOTH LAYERS</text>

  <!-- Main title -->
  <text x="425" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#e6edf3" text-anchor="middle" font-weight="bold">One CLI. Two Layers. Complete Control.</text>
  <text x="425" y="96" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">pbi-cli connects Claude Code to both your semantic model and your report design</text>

  <rect x="60" y="110" width="730" height="1" fill="url(#dl-glow)"/>

  <!-- ============ LEFT: Semantic Model Layer ============ -->
  <rect x="25" y="125" width="390" height="250" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>

  <!-- Layer header -->
  <text x="220" y="149" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#58a6ff" text-anchor="middle" font-weight="bold">Semantic Model Layer</text>
  <line x1="40" y1="160" x2="400" y2="160" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Power BI logo centered -->
  <g transform="translate(192, 172)">
    <rect x="30" y="0" width="16" height="40" rx="3" fill="url(#dl-b1)"/>
    <rect x="15" y="12" width="16" height="28" rx="3" fill="url(#dl-b2)"/>
    <rect x="0" y="22" width="16" height="18" rx="3" fill="url(#dl-b3)"/>
  </g>

  <text x="220" y="228" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle" font-weight="bold">Live .NET Connection</text>
  <text x="220" y="246" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Direct TOM interop via pythonnet</text>

  <!-- Commands -->
  <circle cx="55" cy="268" r="3" fill="#58a6ff" opacity="0.6"/>
  <text x="67" y="272" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi measure create</text>
  <circle cx="55" cy="288" r="3" fill="#58a6ff" opacity="0.6"/>
  <text x="67" y="292" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi dax execute</text>
  <circle cx="55" cy="308" r="3" fill="#58a6ff" opacity="0.6"/>
  <text x="67" y="312" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi database export-tmdl</text>
  <circle cx="55" cy="328" r="3" fill="#58a6ff" opacity="0.6"/>
  <text x="67" y="332" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi relationship create</text>

  <!-- 7 skills badge -->
  <rect x="160" y="354" width="120" height="24" rx="12" fill="#58a6ff" fill-opacity="0.1" stroke="#58a6ff" stroke-width="1"/>
  <text x="220" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="600">7 Claude Skills</text>

  <!-- ============ RIGHT: Report Layer ============ -->
  <rect x="435" y="125" width="390" height="250" rx="10" fill="#161b22" stroke="#06d6a0" stroke-width="1.5"/>

  <!-- Layer header -->
  <text x="600" y="149" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#06d6a0" text-anchor="middle" font-weight="bold">Report Layer</text>
  <line x1="450" y1="160" x2="810" y2="160" stroke="#06d6a0" stroke-width="1" stroke-opacity="0.2"/>

  <!-- NEW badge -->
  <rect x="756" y="135" width="50" height="20" rx="10" fill="#06d6a0"/>
  <text x="781" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#0d1117" text-anchor="middle" font-weight="bold">NEW</text>

  <!-- Report icon centered -->
  <g transform="translate(610, 172)">
    <rect x="0" y="0" width="34" height="42" rx="4" fill="none" stroke="#06d6a0" stroke-width="1.5"/>
    <line x1="5" y1="9" x2="29" y2="9" stroke="#06d6a0" stroke-width="0.8" stroke-opacity="0.3"/>
    <rect x="6" y="16" width="6" height="20" rx="1" fill="#06d6a0" opacity="0.4"/>
    <rect x="14" y="10" width="6" height="26" rx="1" fill="#06d6a0" opacity="0.6"/>
    <rect x="22" y="5" width="6" height="31" rx="1" fill="#06d6a0" opacity="0.8"/>
  </g>

  <text x="630" y="228" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#06d6a0" text-anchor="middle" font-weight="bold">PBIR File Operations</text>
  <text x="630" y="246" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Read/write JSON, no connection</text>

  <!-- Commands -->
  <circle cx="465" cy="268" r="3" fill="#06d6a0" opacity="0.6"/>
  <text x="477" y="272" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi visual add --type bar</text>
  <circle cx="465" cy="288" r="3" fill="#06d6a0" opacity="0.6"/>
  <text x="477" y="292" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi visual bind --category</text>
  <circle cx="465" cy="308" r="3" fill="#06d6a0" opacity="0.6"/>
  <text x="477" y="312" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi filters add-topn --n 10</text>
  <circle cx="465" cy="328" r="3" fill="#06d6a0" opacity="0.6"/>
  <text x="477" y="332" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">pbi report set-theme</text>

  <!-- 5 skills badge -->
  <rect x="570" y="354" width="120" height="24" rx="12" fill="#06d6a0" fill-opacity="0.1" stroke="#06d6a0" stroke-width="1"/>
  <text x="630" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0" text-anchor="middle" font-weight="600">5 Claude Skills</text>

  <!-- ============ Footer stats ============ -->
  <text x="425" y="412" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">27 command groups  |  125+ subcommands  |  32 visual types  |  12 Claude skills</text>
</svg>
