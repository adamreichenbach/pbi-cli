<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f2c811;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b004;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Power BI yellow accent bar -->
  <rect x="0" y="190" width="800" height="10" rx="0" fill="url(#accent)" opacity="0.8"/>

  <!-- Terminal icon -->
  <g transform="translate(60, 55)">
    <rect width="90" height="70" rx="8" fill="#0d1b2a" stroke="#f2c811" stroke-width="2" opacity="0.9"/>
    <text x="12" y="28" font-family="Consolas, monospace" font-size="14" fill="#f2c811">$&gt;</text>
    <text x="12" y="48" font-family="Consolas, monospace" font-size="11" fill="#4cc9f0">pbi</text>
    <rect x="42" y="39" width="8" height="14" fill="#f2c811" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Main title -->
  <text x="190" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="url(#textGlow)" letter-spacing="-1">
    pbi-cli
  </text>

  <!-- Subtitle -->
  <text x="190" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8899aa" letter-spacing="0.5">
    Power BI semantic models from your terminal
  </text>

  <!-- Feature pills -->
  <g transform="translate(190, 138)">
    <rect width="90" height="24" rx="12" fill="#f2c811" opacity="0.15"/>
    <text x="45" y="16" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f2c811" text-anchor="middle">22+ Commands</text>

    <rect x="100" width="82" height="24" rx="12" fill="#4cc9f0" opacity="0.15"/>
    <text x="141" y="16" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#4cc9f0" text-anchor="middle">AI-Optimized</text>

    <rect x="192" width="80" height="24" rx="12" fill="#7b61ff" opacity="0.15"/>
    <text x="232" y="16" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7b61ff" text-anchor="middle">Interactive</text>

    <rect x="282" width="95" height="24" rx="12" fill="#06d6a0" opacity="0.15"/>
    <text x="329" y="16" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0" text-anchor="middle">Cross-Platform</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="720" cy="40" r="3" fill="#f2c811" opacity="0.4"/>
  <circle cx="740" cy="55" r="2" fill="#4cc9f0" opacity="0.3"/>
  <circle cx="710" cy="65" r="2.5" fill="#7b61ff" opacity="0.3"/>
  <circle cx="750" cy="35" r="1.5" fill="#06d6a0" opacity="0.3"/>

  <!-- Connection flow dots -->
  <g opacity="0.15">
    <circle cx="680" cy="100" r="20" fill="none" stroke="#f2c811" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="730" cy="100" r="20" fill="none" stroke="#4cc9f0" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="705" cy="140" r="20" fill="none" stroke="#7b61ff" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
</svg>
