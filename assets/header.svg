<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <!-- Letter P: 7 cols, 7 rows, 2-block strokes -->
    <symbol id="P" overflow="visible">
      <rect x="0" y="0" width="200" height="26" rx="3"/>
      <rect x="0" y="29" width="55" height="26" rx="3"/>
      <rect x="145" y="29" width="55" height="26" rx="3"/>
      <rect x="0" y="58" width="55" height="26" rx="3"/>
      <rect x="145" y="58" width="55" height="26" rx="3"/>
      <rect x="0" y="87" width="200" height="26" rx="3"/>
      <rect x="0" y="116" width="55" height="26" rx="3"/>
      <rect x="0" y="145" width="55" height="26" rx="3"/>
      <rect x="0" y="174" width="55" height="26" rx="3"/>
    </symbol>
    <!-- Letter B: 7 cols, 7 rows -->
    <symbol id="B" overflow="visible">
      <rect x="0" y="0" width="200" height="26" rx="3"/>
      <rect x="0" y="29" width="55" height="26" rx="3"/>
      <rect x="145" y="29" width="55" height="26" rx="3"/>
      <rect x="0" y="58" width="55" height="26" rx="3"/>
      <rect x="145" y="58" width="55" height="26" rx="3"/>
      <rect x="0" y="87" width="200" height="26" rx="3"/>
      <rect x="0" y="116" width="55" height="26" rx="3"/>
      <rect x="145" y="116" width="55" height="26" rx="3"/>
      <rect x="0" y="145" width="55" height="26" rx="3"/>
      <rect x="145" y="145" width="55" height="26" rx="3"/>
      <rect x="0" y="174" width="200" height="26" rx="3"/>
    </symbol>
    <!-- Letter I: 4 cols, 7 rows -->
    <symbol id="I" overflow="visible">
      <rect x="0" y="0" width="113" height="26" rx="3"/>
      <rect x="29" y="29" width="55" height="26" rx="3"/>
      <rect x="29" y="58" width="55" height="26" rx="3"/>
      <rect x="29" y="87" width="55" height="26" rx="3"/>
      <rect x="29" y="116" width="55" height="26" rx="3"/>
      <rect x="29" y="145" width="55" height="26" rx="3"/>
      <rect x="0" y="174" width="113" height="26" rx="3"/>
    </symbol>
    <!-- Letter C: 7 cols, 7 rows -->
    <symbol id="C" overflow="visible">
      <rect x="0" y="0" width="200" height="26" rx="3"/>
      <rect x="0" y="29" width="55" height="26" rx="3"/>
      <rect x="0" y="58" width="55" height="26" rx="3"/>
      <rect x="0" y="87" width="55" height="26" rx="3"/>
      <rect x="0" y="116" width="55" height="26" rx="3"/>
      <rect x="0" y="145" width="55" height="26" rx="3"/>
      <rect x="0" y="174" width="200" height="26" rx="3"/>
    </symbol>
    <!-- Letter L: 7 cols, 7 rows -->
    <symbol id="L" overflow="visible">
      <rect x="0" y="0" width="55" height="26" rx="3"/>
      <rect x="0" y="29" width="55" height="26" rx="3"/>
      <rect x="0" y="58" width="55" height="26" rx="3"/>
      <rect x="0" y="87" width="55" height="26" rx="3"/>
      <rect x="0" y="116" width="55" height="26" rx="3"/>
      <rect x="0" y="145" width="55" height="26" rx="3"/>
      <rect x="0" y="174" width="200" height="26" rx="3"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#1a1a1a"/>

  <!-- 3D Shadow layer (offset +5,+5) -->
  <g fill="#7A6508" stroke="#5C4C06" stroke-width="1.5">
    <use href="#P" x="88" y="23"/>
    <use href="#B" x="349" y="23"/>
    <use href="#I" x="610" y="23"/>
    <use href="#C" x="88" y="275"/>
    <use href="#L" x="349" y="275"/>
    <use href="#I" x="610" y="275"/>
  </g>

  <!-- Main block layer -->
  <g fill="#F2C811" stroke="#B8960D" stroke-width="1.5">
    <use href="#P" x="83" y="18"/>
    <use href="#B" x="344" y="18"/>
    <use href="#I" x="605" y="18"/>
    <use href="#C" x="83" y="270"/>
    <use href="#L" x="344" y="270"/>
    <use href="#I" x="605" y="270"/>
  </g>

  <!-- Subtitle -->
  <text x="400" y="500" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#8899aa" letter-spacing="2">
    Power BI semantic models from your terminal
  </text>

  <!-- Accent bar -->
  <rect x="0" y="512" width="800" height="8" fill="#F2C811" opacity="0.6" rx="0"/>
</svg>
