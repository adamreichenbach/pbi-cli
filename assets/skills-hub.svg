  <line x1="425" y1="110" x2="425" y2="140" stroke="#F2C811" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Horizontal branch line -->
  <line x1="75" y1="140" x2="775" y2="140" stroke="#F2C811" stroke-width="2" stroke-opacity="0.3"/>

