<svg xmlns="http://www.w3.org/2000/svg" width="850" height="420" viewBox="0 0 850 420">
  <defs>
    <linearGradient id="glow-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2C811" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F2C811" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F2C811" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="425" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#F2C811" text-anchor="middle" font-weight="bold">12 Skills That Claude Discovers Automatically</text>
  <text x="425" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Two layers, one CLI. Claude picks the right skill for every task.</text>

  <!-- Root node: PBI-CLI -->
  <rect x="350" y="66" width="150" height="38" rx="8" fill="#161b22" stroke="#F2C811" stroke-width="2"/>
  <text x="425" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#F2C811" text-anchor="middle" font-weight="bold">pbi-cli</text>

  <!-- Split into two branches -->
  <line x1="425" y1="104" x2="425" y2="120" stroke="#F2C811" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="240" y1="120" x2="610" y2="120" stroke="#F2C811" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="240" y1="120" x2="240" y2="140" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="610" y1="120" x2="610" y2="140" stroke="#06d6a0" stroke-width="2" stroke-opacity="0.4"/>

  <!-- ======================== ROW 1: SEMANTIC MODEL LAYER ======================== -->

  <!-- Modeling Layer Label -->
  <rect x="128" y="140" width="224" height="30" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="240" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#58a6ff" text-anchor="middle" font-weight="bold">Semantic Model Layer</text>
  <text x="240" y="178" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">requires pbi connect</text>

  <!-- Modeling branch line -->
  <line x1="57" y1="195" x2="423" y2="195" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- 7 modeling skills -->
  <!-- Skill 1: DAX -->
  <line x1="57" y1="195" x2="57" y2="210" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="15" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="57" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="bold">DAX</text>
  <text x="57" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Queries</text>

  <!-- Skill 2: Modeling -->
  <line x1="118" y1="195" x2="118" y2="210" stroke="#F2C811" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="76" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#F2C811" stroke-width="1.2"/>
  <text x="118" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#F2C811" text-anchor="middle" font-weight="bold">Modeling</text>
  <text x="118" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Tables</text>

  <!-- Skill 3: Deployment -->
  <line x1="179" y1="195" x2="179" y2="210" stroke="#7b61ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="137" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#7b61ff" stroke-width="1.2"/>
  <text x="179" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#7b61ff" text-anchor="middle" font-weight="bold">Deploy</text>
  <text x="179" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">TMDL</text>

  <!-- Skill 4: Security -->
  <line x1="240" y1="195" x2="240" y2="210" stroke="#06d6a0" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="198" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#06d6a0" stroke-width="1.2"/>
  <text x="240" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#06d6a0" text-anchor="middle" font-weight="bold">Security</text>
  <text x="240" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">RLS</text>

  <!-- Skill 5: Docs -->
  <line x1="301" y1="195" x2="301" y2="210" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="259" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#ff6b6b" stroke-width="1.2"/>
  <text x="301" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ff6b6b" text-anchor="middle" font-weight="bold">Docs</text>
  <text x="301" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Dictionary</text>

  <!-- Skill 6: Partitions -->
  <line x1="362" y1="195" x2="362" y2="210" stroke="#a0c4ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="320" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#a0c4ff" stroke-width="1.2"/>
  <text x="362" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a0c4ff" text-anchor="middle" font-weight="bold">Partitions</text>
  <text x="362" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Sources</text>

  <!-- Skill 7: Diagnostics -->
  <line x1="423" y1="195" x2="423" y2="210" stroke="#ffd166" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="381" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#ffd166" stroke-width="1.2"/>
  <text x="423" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffd166" text-anchor="middle" font-weight="bold">Diagnostics</text>
  <text x="423" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Tracing</text>

  <!-- ======================== ROW 2: REPORT LAYER ======================== -->

  <!-- Report Layer Label -->
  <rect x="498" y="140" width="224" height="30" rx="6" fill="#161b22" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="610" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#06d6a0" text-anchor="middle" font-weight="bold">Report Layer</text>
  <text x="610" y="178" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">no connection needed</text>

  <!-- Report branch line -->
  <line x1="510" y1="195" x2="808" y2="195" stroke="#06d6a0" stroke-width="1" stroke-opacity="0.2"/>

  <!-- 5 report skills -->
  <!-- Skill 8: Report -->
  <line x1="540" y1="195" x2="540" y2="210" stroke="#06d6a0" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="498" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#06d6a0" stroke-width="1.2"/>
  <text x="540" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#06d6a0" text-anchor="middle" font-weight="bold">Report</text>
  <text x="540" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Scaffold</text>

  <!-- Skill 9: Visuals -->
  <line x1="607" y1="195" x2="607" y2="210" stroke="#d97757" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="565" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#d97757" stroke-width="1.2"/>
  <text x="607" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d97757" text-anchor="middle" font-weight="bold">Visuals</text>
  <text x="607" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">32 Types</text>

  <!-- Skill 10: Pages -->
  <line x1="674" y1="195" x2="674" y2="210" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="632" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="674" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="bold">Pages</text>
  <text x="674" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Layout</text>

  <!-- Skill 11: Themes -->
  <line x1="741" y1="195" x2="741" y2="210" stroke="#F2C811" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="699" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#F2C811" stroke-width="1.2"/>
  <text x="741" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#F2C811" text-anchor="middle" font-weight="bold">Themes</text>
  <text x="741" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Styling</text>

  <!-- Skill 12: Filters -->
  <line x1="808" y1="195" x2="808" y2="210" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="766" y="210" width="84" height="30" rx="6" fill="#161b22" stroke="#ff6b6b" stroke-width="1.2"/>
  <text x="808" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ff6b6b" text-anchor="middle" font-weight="bold">Filters</text>
  <text x="808" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">TopN, Date</text>

  <!-- ======================== STATS BAR ======================== -->
  <rect x="60" y="285" width="730" height="1" fill="url(#glow-line)"/>

  <!-- Stats -->
  <text x="130" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#F2C811" text-anchor="middle" font-weight="bold">27</text>
  <text x="130" y="338" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Command Groups</text>

  <text x="310" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#58a6ff" text-anchor="middle" font-weight="bold">125+</text>
  <text x="310" y="338" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Subcommands</text>

  <text x="490" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#06d6a0" text-anchor="middle" font-weight="bold">32</text>
  <text x="490" y="338" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Visual Types</text>

  <text x="670" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#d97757" text-anchor="middle" font-weight="bold">12</text>
  <text x="670" y="338" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Claude Skills</text>

  <!-- Footer -->
  <text x="425" y="380" font-family="'Courier New', Courier, monospace" font-size="14" fill="#58a6ff" text-anchor="middle" font-weight="bold">pbi skills list</text>
  <text x="425" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Claude reads the skill matching your task and knows exactly which commands to use</text>
</svg>
